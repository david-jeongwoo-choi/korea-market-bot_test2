name: Korea Market Bot

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v3

      - name: Python 설치
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: 실행
        run: python news_bot.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
